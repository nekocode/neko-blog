{{- /* Markdown 链接渲染钩子：站外新窗口、站内当前窗口（构建期静态写死，无运行时 JS）。 */ -}}
{{- $u := urls.Parse .Destination -}}
{{- $external := and (in (slice "http" "https") $u.Scheme) (ne $u.Host (urls.Parse site.BaseURL).Host) -}}
<a href="{{ .Destination | safeURL }}"{{ with .Title }} title="{{ . }}"{{ end }}{{ if $external }} target="_blank" rel="noopener"{{ end }}>{{ .Text | safeHTML }}</a>
